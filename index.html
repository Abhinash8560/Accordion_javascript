<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>golden-meadow-shiny</title>
  </head>

  <body>
    <div class="app">
          <h1 style='text-align: center';>Accordion in Js</h1>
          <div class="accordion">
            <div class="title">Section 1 <span class="icon">+</span>
    </div>
    <div class="content">This is the content of section 1.</div>
          </div>
          <div class="accordion">
            <div class="title">Section 2 <span class="icon">+</span>
    </div>
    <div class="content">This is the content of section 2.</div>
          </div>
          <div class="accordion">
            <div class="title">Section 3 <span class="icon">+</span>
    </div>
    <div class="content">This is the content of section 3.</div>
          </div>
          <div class="accordion">
            <div class="title">Section 4 <span class="icon">+</span>
    </div>
    <div class="content">This is the content of section 4.</div>
          </div>
      
    </div>
    <script>
 const headers=document.querySelectorAll('.title');
      headers.forEach(header=>{
        header.addEventListener('click',()=>{
          const content=header.nextElementSibling;
          const icon = header.querySelector('.icon');

            document.querySelectorAll('.content').forEach(c => {
          c.style.display = 'none';
        });
        document.querySelectorAll('.icon').forEach(i => {
          i.textContent = '+'; 
        });
          
          if(content.style.display=== 'block'){
            content.style.display='none';
           icon.textContent = '+';
          }else {
            content.style.display='block';
            icon.textContent = '-';
          }
        })
      })

      
    </script>
  </body>
</html>
