<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Accordion</title>
  <style>
    .accordion-header {
      background: #ddd;
      padding: 10px;
      cursor: pointer;
      border: 1px solid #aaa;
      margin-top: 5px;
    }

    .accordion-content {
      display: none; /* hidden by default */
      padding: 10px;
      border: 1px solid #aaa;
      border-top: none;
    }
  </style>
</head>
<body>

  <div class="accordion">
    <div class="accordion-header">Section 1</div>
    <div class="accordion-content">This is the content of section 1.</div>
  </div>

  <div class="accordion">
    <div class="accordion-header">Section 2</div>
    <div class="accordion-content">This is the content of section 2.</div>
  </div>

  <div class="accordion">
    <div class="accordion-header">Section 3</div>
    <div class="accordion-content">This is the content of section 3.</div>
  </div>

  <script>
    // Step 1: Get all headers
    const headers = document.querySelectorAll(".accordion-header");

    // Step 2: Loop through each header
    headers.forEach(header => {
      // Step 3: Add a click event to each header
      header.addEventListener("click", () => {
        // Step 4: Find the content right after the header
        const content = header.nextElementSibling;

        // Step 5: Toggle display (show/hide)
        if (content.style.display === "block") {
          content.style.display = "none"; // hide if open
        } else {
          content.style.display = "block"; // show if hidden
        }
      });
    });
  </script>

</body>
</html>
